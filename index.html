<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bluefy Transcription Test</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <p class="eyebrow">Bluefy / iPhone test</p>
        <h1>文字起こしテスト</h1>
        <p>Bluefyでマイク、標準文字起こし、無料AI文字起こしが使えるか確認します。</p>
      </header>

      <section class="panel">
        <h2>1. 状態確認</h2>
        <div class="status-grid">
          <div>
            <span class="label">マイク</span>
            <strong id="micStatus">未確認</strong>
          </div>
          <div>
            <span class="label">標準文字起こし</span>
            <strong id="nativeStatus">未確認</strong>
          </div>
          <div>
            <span class="label">無料AI文字起こし</span>
            <strong id="aiStatus">未確認</strong>
          </div>
        </div>
        <button id="checkButton" type="button">機能を確認</button>
      </section>

      <section class="panel">
        <h2>2. マイク録音テスト</h2>
        <p class="hint">Bluefyでまずここが動けば、音声データ自体は取得できています。</p>
        <div class="meter">
          <div id="levelBar"></div>
        </div>
        <div class="actions">
          <button id="recordButton" type="button">3秒録音</button>
          <button id="playButton" type="button" disabled>再生</button>
        </div>
        <audio id="audioPlayer" controls hidden></audio>
      </section>

      <section class="panel">
        <h2>3. 標準文字起こし</h2>
        <p class="hint">Safariで動きやすい方式です。Bluefyではここが失敗する可能性があります。</p>
        <div class="actions">
          <button id="nativeButton" type="button">標準文字起こし開始</button>
          <button id="nativeStopButton" type="button" disabled>停止</button>
        </div>
        <textarea id="nativeText" readonly placeholder="認識結果がここに出ます"></textarea>
      </section>

      <section class="panel">
        <h2>4. 無料AI文字起こし</h2>
        <p class="hint">録音した音声をブラウザ内のWhisper tinyで解析します。初回はモデル読み込みに時間がかかります。</p>
        <button id="aiButton" type="button" disabled>録音した音声をAI解析</button>
        <textarea id="aiText" readonly placeholder="AI解析結果がここに出ます"></textarea>
      </section>

      <section class="panel log-panel">
        <h2>ログ</h2>
        <pre id="log"></pre>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
